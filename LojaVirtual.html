<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja Profissional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .grid-produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 18px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .card img { width: 100%; height: 200px; object-fit: contain; border-radius: 10px; }
        .preco { color: #2ecc71; font-weight: bold; font-size: 1.2em; display: block; margin: 10px 0; }
        .btn-buy { background: #25d366; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body onload="carregar()">

<div class="container">
    <h2 style="text-align:center">Vitrine de Produtos</h2>
    <div id="vitrine" class="grid-produtos"></div>
</div>

<script>
    function carregar() {
        // PRODUTO FIXO PARA TODOS OS CLIENTES
        const produtosPadrao = [
            {
                nome: "PlayStation 5",
                preco: "3.500",
                // Link de imagem novo e testado
                foto: "https://m.media-amazon.com/images/I/51051Hi9R9L._AC_SL1000_.jpg"
            }
        ];

        const meuZap = "5514991192528"; // Seu número configurado
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = '';

        produtosPadrao.forEach((p) => {
            const msg = encodeURIComponent(`Olá! Quero comprar o ${p.nome} por R$ ${p.preco}`);
            const linkZap = `https://wa.me/${meuZap}?text=${msg}`;

            vitrine.innerHTML += `
                <div class="card">
                    <img src="${p.foto}" alt="PS5">
                    <h3>${p.nome}</h3>
                    <span class="preco">R$ ${p.preco}</span>
                    <a href="${linkZap}" target="_blank" class="btn-buy">Comprar agora</a>
                </div>
            `;
        });
    }
</script>
</body>
</html>
